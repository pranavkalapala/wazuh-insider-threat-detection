<!--
  Wazuh - Agent - Default configuration for Windows
  More info at: https://documentation.wazuh.com
  Mailing list: https://groups.google.com/forum/#!forum/wazuh
-->
<ossec_config>
  <client>
    <server>
      <address>172.16.30.134</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>windows, windows10</config-profile>
    <crypto_method>aes</crypto_method>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <enrollment>
      <enabled>yes</enabled>
      <manager_address>172.16.30.134</manager_address>
      <agent_name>win-victim</agent_name>
    </enrollment>
  </client>
  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>
  <!-- Windows Event Logs -->
  <localfile>
    <location>Application</location>
    <log_format>eventchannel</log_format>
  </localfile>
  <localfile>
    <location>Security</location>
    <log_format>eventchannel</log_format>
  </localfile>
  <localfile>
    <location>System</location>
    <log_format>eventchannel</log_format>
  </localfile>
  <!-- File Integrity Monitoring -->
  <syscheck>
    <disabled>no</disabled>
    <directories realtime="yes">C:\IR-lab</directories>
    <frequency>60</frequency>
    <!-- Default Windows monitoring -->
    <directories recursion_level="0">%WINDIR%</directories>
    <directories recursion_level="0">%WINDIR%\System32</directories>
    <!-- Startup monitoring -->
    <directories realtime="yes">%PROGRAMDATA%\Microsoft\Windows\Start Menu\Programs\Startup</directories>
    <!-- INSIDER THREAT TARGETS -->
   <directories check_all="yes" realtime="yes">C:\Users\prana\Documents</directories>
   <directories check_all="yes" realtime="yes">C:\Users\prana\Desktop</directories>
   <directories check_all="yes" realtime="yes">C:\Users\prana\Downloads</directories>
   <directories check_all="yes" realtime="yes">C:\Temp</directories>
    <!-- Ignore noise -->
    <ignore type="sregex">.log$|.tmp$|.png$|.jpg$|.evtx$</ignore>
    <ignore>C:\Users\prana\AppData</ignore>
  </syscheck>
  <!-- Registry monitoring -->
  <rootcheck>
    <disabled>no</disabled>
  </rootcheck>
  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
  </sca>
  <active-response>
    <disabled>no</disabled>
  </active-response>
  <logging>
    <log_format>plain</log_format>
  </logging>
</ossec_config>
<!-- END of Default Configuration. -->
